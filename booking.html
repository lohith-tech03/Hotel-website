<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book a Room | TELAGANENI HOTELS</title>

    <meta name="description" content="Book your stay at Royal Stay Hotel.">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav>

            <div class="logo">
                TELAGANENI HOTELS
            </div>

            <div class="menu-toggle" id="menu-toggle">
                ☰
            </div>

            <ul id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="rooms.html">Rooms</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="booking.html">Booking</a></li>
            </ul>

        </nav>
    </header>

    <section class="page-banner">
        <h1>Book Your Stay</h1>
    </section>

    <section class="booking-section">

        <form id="bookingForm">

            <input type="text" id="name" placeholder="Full Name">

            <input type="email" id="email" placeholder="Email Address">

            <input type="tel" id="phone" placeholder="Phone Number">

            <label>Check-In Date</label>
            <input type="date" id="checkin">

            <label>Check-Out Date</label>
            <input type="date" id="checkout">

            <select id="room">
                <option value="">Select Room Type</option>
                <option>Deluxe Room</option>
                <option>Executive Room</option>
                <option>Suite Room</option>
            </select>

            <button type="submit">Book Now</button>

        </form>

    </section>
    <section class="location">

        <h2>OUR LOCATION</h2>

        <p>
            TELAGANENI HOTELS, 123 Luxury Street,
            Bandra West, Mumbai, Maharashtra 400050
        </p>

        <p>
            Phone: +91 98765 43210
        </p>

        <p>
            Email: info@telaganenihotels.com
        </p>

    </section>
    <iframe src="https://www.google.com/maps?q=Bandra%20West%20Mumbai&output=embed" width="100%" height="400"
        style="border:0;" allowfullscreen="" loading="lazy">
    </iframe>

    <footer>
        <h3>TELAGANENI HOTELS</h3>
        <p>123 Luxury Street, Mumbai, India</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
